name: HTF Backtest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 6am UTC — remove if unwanted

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.54" pandas numpy
          echo "--- Installed versions ---"
          pip show yfinance pandas numpy | grep -E "^(Name|Version)"

      - name: Run backtest
        run: python htf_backtest.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: htf-backtest-results
          path: |
            htf_trade_log.csv
            htf_equity_curve.csv
            htf_summary.txt
          retention-days: 30
