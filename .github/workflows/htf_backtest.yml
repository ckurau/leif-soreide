name: HTF Backtest

on:
  workflow_dispatch:   # Run manually from the Actions tab whenever you want
  schedule:
    - cron: "0 6 * * 1"  # Also runs every Monday at 6am UTC (optional, remove if unwanted)

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Plenty of time for download + backtest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run backtest
        run: python htf_backtest.py

      - name: Upload results as artifacts
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if backtest finds 0 trades, so you can debug
        with:
          name: htf-backtest-results
          path: |
            htf_trade_log.csv
            htf_equity_curve.csv
            htf_summary.txt
          retention-days: 30   # Files stay available for 30 days
